services:
  mongo:
    image: mongo:8.0
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    image: java-spring-learning:prod
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - app.env
    environment:
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "${APP_PORT:-8080}:8080"

volumes:
  mongo-data:
