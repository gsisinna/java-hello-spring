services:
  mongo:
    image: mongo:8.0
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: java-spring-learning:local
    depends_on:
      - mongo
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/java_spring_learning
    ports:
      - "8080:8080"

  test:
    image: eclipse-temurin:17-jdk-jammy
    working_dir: /workspace
    command: ["./gradlew", "--no-daemon", "test"]
    volumes:
      - .:/workspace
      - gradle-cache:/root/.gradle

volumes:
  gradle-cache:
  mongo-data:
