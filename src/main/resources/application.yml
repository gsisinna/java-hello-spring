spring:
  application:
    name: java-spring-learning
  datasource:
    url: jdbc:h2:mem:learningdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

app:
  learning:
    title: Java + Spring Boot Learning Repo
    focus-topics:
      - java basics
      - spring mvc
      - validation
      - jpa
      - security
