spring:
  application:
    name: java-spring-learning
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/java_spring_learning}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

app:
  learning:
    title: Java + Spring Boot Learning Repo
    focus-topics:
      - java basics
      - spring mvc
      - validation
      - mongodb
      - security
  security:
    username: student
    password: password
    role: STUDENT

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
